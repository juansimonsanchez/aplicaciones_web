<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de Estructura HTML5</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        header {
            background-color: #007BFF;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: #0056b3;
            padding: 10px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            padding: 20px;
        }
        section {
            margin: 10px;
            border: 1px solid #ccc;
            padding: 10px;
            background-color: white;
        }
        article {
            margin-bottom: 10px;
        }
        footer {
            background-color: #007BFF;
            color: white;
            text-align: center;
            padding: 10px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mi Sitio Web</h1>
        <p>Bienvenido a mi sitio web de ejemplo.</p>
    </header>

    <nav>
        <a href="#seccion">Sección Única</a>
    </nav>

    <main>
        <section id="seccion">
            <h2>Sección Única</h2>
            <article>
                <h3>Artículo 1</h3>
                <p>Contenido del artículo 1. Aquí se habla de un tema interesante.</p>
            </article>
            <article>
                <h3>Artículo 2</h3>
                <p>Contenido del artículo 2. Otro tema relevante se discute aquí.</p>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Mi Sitio Web. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
